<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a8c4e"/>
      <stop offset="100%" stop-color="#0d6b38"/>
    </linearGradient>
    <linearGradient id="pinGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f7f7f7"/>
      <stop offset="100%" stop-color="#e8f5e9"/>
    </linearGradient>
    <filter id="shadow" x="-15%" y="-15%" width="135%" height="135%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.2"/>
    </filter>
    <filter id="innerShadow">
      <feDropShadow dx="2" dy="4" stdDeviation="5" flood-color="#a05000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- App Icon Background -->
  <rect width="512" height="512" rx="108" fill="url(#bgGrad)"/>

  <!-- Subtle inner glow ring -->
  <rect x="8" y="8" width="496" height="496" rx="104" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="3"/>

  <!-- Location Pin (white) -->
  <path d="M256 78
    C187 78 131 134 131 203
    C131 302 246 430 252 436.5
    C254.2 439 257.8 439 260 436.5
    C266 430 381 302 381 203
    C381 134 325 78 256 78 Z"
    fill="url(#pinGrad)" filter="url(#shadow)"/>

  <!-- === Cleaner Figure (Orange, professional) === -->
  <g filter="url(#innerShadow)">

    <!-- HEAD -->
    <circle cx="272" cy="143" r="24" fill="#e67e22"/>

    <!-- TORSO / curved body arc (sweeping forward lean) -->
    <path d="M268 167
      Q220 195 215 255
      Q213 285 240 295
      Q258 300 268 280
      Q248 265 252 235
      Q258 205 285 185
      Z"
      fill="#e67e22"/>

    <!-- LONG BROOM HANDLE (left hand, leaning forward) -->
    <line x1="223" y1="195" x2="188" y2="310"
      stroke="#e67e22" stroke-width="13" stroke-linecap="round"/>

    <!-- ARM reaching to broom handle -->
    <path d="M258 205 Q235 200 220 215"
      fill="none" stroke="#e67e22" stroke-width="13" stroke-linecap="round"/>

    <!-- BROOM HEAD - big sweeping broom (left) -->
    <path d="M165 308 Q178 298 210 305 L205 340 Q175 345 158 335 Z"
      fill="#e67e22"/>
    <!-- Bristle lines on left broom -->
    <line x1="170" y1="310" x2="163" y2="340" stroke="#1a8c4e" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="181" y1="308" x2="177" y2="340" stroke="#1a8c4e" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="193" y1="307" x2="192" y2="339" stroke="#1a8c4e" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="204" y1="307" x2="206" y2="338" stroke="#1a8c4e" stroke-width="3.5" stroke-linecap="round"/>

    <!-- Small DUSTPAN BROOM / right hand detail -->
    <path d="M268 237 Q298 240 308 253"
      fill="none" stroke="#e67e22" stroke-width="11" stroke-linecap="round"/>
    <!-- Small broom handle -->
    <line x1="308" y1="253" x2="318" y2="285"
      stroke="#e67e22" stroke-width="9" stroke-linecap="round"/>
    <!-- Small broom head -->
    <path d="M303 282 Q313 276 328 283 L325 300 Q310 305 299 298 Z"
      fill="#e67e22"/>
    <!-- Bristle lines on right broom -->
    <line x1="306" y1="284" x2="302" y2="300" stroke="#1a8c4e" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="314" y1="281" x2="312" y2="299" stroke="#1a8c4e" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="323" y1="283" x2="323" y2="299" stroke="#1a8c4e" stroke-width="2.5" stroke-linecap="round"/>

  </g>
</svg>
